<svg width="220" height="50" viewBox="0 0 220 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Goat Icon - Scaled to match G height -->
  <g transform="translate(8, 15) scale(0.5)">
    <!-- Body -->
    <ellipse cx="20" cy="25" rx="12" ry="8" fill="#7A8B5E"/>
    
    <!-- Head -->
    <circle cx="12" cy="18" r="7" fill="#7A8B5E"/>
    
    <!-- Ears -->
    <ellipse cx="8" cy="13" rx="2.5" ry="4" fill="#7A8B5E" transform="rotate(-20 8 13)"/>
    <ellipse cx="16" cy="13" rx="2.5" ry="4" fill="#7A8B5E" transform="rotate(20 16 13)"/>
    
    <!-- Horns -->
    <path d="M 7 12 Q 5 8 6 6" stroke="#7A8B5E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 17 12 Q 19 8 18 6" stroke="#7A8B5E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    
    <!-- Eye -->
    <circle cx="11" cy="17" r="1.2" fill="#FFFFFF"/>
    <circle cx="11" cy="17" r="0.6" fill="#7A8B5E"/>
    
    <!-- Nose -->
    <circle cx="8" cy="20" r="1" fill="#6B7A4E"/>
    
    <!-- Legs -->
    <rect x="14" y="30" width="2" height="8" rx="1" fill="#7A8B5E"/>
    <rect x="18" y="30" width="2" height="8" rx="1" fill="#7A8B5E"/>
    <rect x="24" y="30" width="2" height="8" rx="1" fill="#7A8B5E"/>
    <rect x="28" y="30" width="2" height="8" rx="1" fill="#7A8B5E"/>
    
    <!-- Tail -->
    <path d="M 32 24 Q 36 22 38 26" stroke="#7A8B5E" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text: GoatFarm -->
  <text x="38" y="33" font-family="'Georgia', serif" font-size="28" font-weight="600" fill="#7A8B5E">GoatFarm</text>
</svg>

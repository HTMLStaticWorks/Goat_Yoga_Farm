<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | GoatFarm</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card animate-up">
        <a href="index.html" class="auth-logo">GoatFarm</a>
        
        <h2 style="margin-bottom: 30px;">Join the Herd! 🐐</h2>
        
        <form action="dashboard.html" method="GET" style="display: flex; flex-direction: column; align-items: center;">
            <div class="form-group" style="width: 100%;">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group" style="width: 100%;">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group" style="width: 100%;">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Create a password" required>
            </div>
            
            <div class="form-group" style="width: 100%;">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" placeholder="Confirm your password" required>
            </div>
            
            <div class="form-group checkbox-group" style="width: 100%; text-align: left;">
                <input type="checkbox" id="terms" required>
                <label for="terms" style="font-size: 0.9rem;">I accept the <a href="#" style="color: var(--primary); font-weight: 500;">Terms & Conditions</a></label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Register</button>
        </form>
        
        <div class="auth-divider">OR</div>
        
        <button class="social-btn google-btn">
             <span style="font-size: 1.25rem;">G</span> Continue with Google
        </button>
        
        <button class="social-btn email-btn">
             <span style="font-size: 1.25rem;">✉</span> Continue with Email
        </button>
        
        <div style="margin-top: 30px; font-size: 0.95rem;">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Login</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>

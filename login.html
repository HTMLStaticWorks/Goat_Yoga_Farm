<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GoatFarm</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body class="auth-page">

    <div class="auth-card animate-up" style="position: relative;">
        <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
            <button class="rtl-toggle theme-toggle" title="Toggle RTL"
                style="background: var(--bg-secondary); border: 1px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">🌐</button>
            <button class="theme-toggle"
                style="background: var(--bg-secondary); border: 1px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">🌙</button>
        </div>
        <a href="index.html" class="auth-logo"
            style="display: flex; justify-content: center; align-items: center; margin-bottom: 30px; width: 100%;">
            <img src="assets/images/logo.svg" alt="GoatFarm">
        </a>

        <h3 style="margin-bottom: 30px;">Welcome Back! 🐐</h3>

        <form action="dashboard.html" method="GET" style="display: flex; flex-direction: column; align-items: center;">
            <div class="form-group" style="width: 100%;">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" placeholder="Enter your email" required>
            </div>

            <div class="form-group" style="width: 100%; margin-bottom: 5px;">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <div
                style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <label
                    style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer; opacity: 0.8;">
                    <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--primary);">
                    Remember me
                </label>
                <a href="#" style="color: var(--primary); font-size: 0.9rem; font-weight: 500;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>

        <div class="auth-divider">OR</div>

        <button class="social-btn google-btn">
            <span style="font-size: 1.25rem;">G</span> Continue with Google
        </button>

        <button class="social-btn email-btn">
            <span style="font-size: 1.25rem;">✉</span> Continue with Email
        </button>

        <div style="margin-top: 30px; font-size: 0.95rem;">
            Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Register</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
